# .github/workflows/ci.yml
# Workflow de la Clase 1 — se va construyendo paso a paso

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  APP_NAME: cron-ticker

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: dist

    steps:
      - uses: actions/checkout@v4

      - name: Show env local variables
        run: |
          echo "App: ${{ env.APP_NAME }}, Node: ${{ env.NODE_VERSION }}"

      - name: Show env github variables
        run: |
          echo "App: ${{ vars.APP_VERSION }}"

      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }} 

      - name: Build 
        run: npm run build
        env:
          APP_VERSION: ${{ vars.APP_VERSION }}

      - name: Deploy (conceptual) #Add this
        run: echo "Deploying with key ${{ secrets.API_KEY }}"
        # En los logs verás: Deploying with key ***

      # Token automático de GitHub (siempre disponible, sin crearlo):
      # ${{ secrets.GITHUB_TOKEN }}  → permisos para push, crear releases, etc.



        

