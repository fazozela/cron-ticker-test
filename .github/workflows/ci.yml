# .github/workflows/ci.yml
# Workflow de la Clase 1 — se va construyendo paso a paso

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Variables a nivel de workflow completo (disponibles en TODOS los jobs)
env:
  NODE_VERSION: '20'
  APP_NAME: cron-ticker


jobs:

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest

    # Variables a nivel de job (disponibles en TODOS los steps de este job)
    env:
      BUILD_DIR: dist

    steps:
      - name: Show variables
        run: echo "App $APP_NAME, Node $NODE_VERSION"

      # Variables a nivel de step (solo para este step)
      - name: Build
        run: npm run build
        env:
          APP_VERSION: '2.0.0'

